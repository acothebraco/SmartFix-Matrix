name: Build firmware and deploy web flasher

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO and esptool
        run: pip install platformio esptool

      - name: Resolve firmware version
        run: |
          VER="$(grep -E '^[[:space:]]*#define[[:space:]]+FIRMWARE_VERSION[[:space:]]+"' src/config.h | head -n 1 | sed -E 's/.*"([^"]+)".*/\1/')"
          VER="${VER#v}"
          if [ -z "$VER" ]; then
            git fetch --tags --force
            VER="$(git tag --sort=-v:refname | head -n 1 | sed 's/^v//')"
          fi
          echo "FWVER=${VER:-dev}" >> "$GITHUB_ENV"
          echo "BUILDDATE=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"
          echo "Firmware version: ${VER:-dev}"

      - name: Build firmware
        run: pio run -e esp32-s3-rgb-matrix

      - name: Prepare GitHub Pages site
        run: |
          B=".pio/build/esp32-s3-rgb-matrix"
          mkdir -p site
          cp web/flash/index.html web/flash/manifest.json site/

          sed -i -E "s/__FWVER__/${FWVER:-dev}/g; s/__BUILDDATE__/${BUILDDATE:-unknown}/g" site/index.html site/manifest.json

          if [ -f "$B/DIY-LED-Matrix-usb.bin" ]; then
            cp "$B/DIY-LED-Matrix-usb.bin" site/DIY-LED-Matrix-usb.bin
          else
            BOOT_APP0="$(find "$HOME/.platformio/packages" -name boot_app0.bin -path '*framework-arduinoespressif32*' | head -1)"
            python -m esptool --chip esp32s3 merge_bin \
              -o site/DIY-LED-Matrix-usb.bin \
              --flash_mode dio \
              --flash_freq 80m \
              --flash_size 32MB \
              0x0 "$B/bootloader.bin" \
              0x8000 "$B/partitions.bin" \
              0xe000 "$BOOT_APP0" \
              0x10000 "$B/firmware.bin"
          fi

          ls -lh site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
